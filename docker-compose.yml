version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: trustshield-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trustshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    restart: unless-stopped

  ml-service:
    build: ./ml-service
    container_name: trustshield-ml
    ports:
      - "8080:8080"
    volumes:
      - ./ml-service:/app
    environment:
      - PORT=8080
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: trustshield-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trustshield
      - ML_SERVICE_URL=http://ml-service:8080
      - JWT_SECRET=trustshield_jwt_anchor_key_2026
      - NODE_ENV=development
    depends_on:
      - db
      - ml-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: trustshield-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
